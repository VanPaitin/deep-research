name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  backend:
    name: Backend image to ECR
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'deep-research-api' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          SHA_IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          LATEST_IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:latest"
          docker build --platform linux/amd64 -t "$SHA_IMAGE_URI" -t "$LATEST_IMAGE_URI" .
          docker push "$SHA_IMAGE_URI"
          docker push "$LATEST_IMAGE_URI"
          echo "image_uri=$SHA_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$LATEST_IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          {
            echo "### Backend"
            echo "- Image: \`${{ steps.image.outputs.image_uri }}\`"
            echo "- Latest image: \`${{ steps.image.outputs.latest_image_uri }}\`"
            echo "- App Runner deployment is triggered by ECR push."
          } >> "$GITHUB_STEP_SUMMARY"
